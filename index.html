<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Carousel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-dark text-light">

    <div class="container my-5">
        <h1 class="text-center mb-4"> Bootstrap Carousel Examples</h1>
        <!-- First Row: 1 Carousel -->
        <div class="row mb-4 justify-content-center">
            <div class="col-12">
                <h2 class="text-center mb-3">Full Width Carousel</h2>
                <div id="carouselExample" class="carousel slide">
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="img/siamese.jpg" class="d-block w-100 img-fluid" alt="Siamese">
                        </div>
                        <div class="carousel-item">
                            <img src="img/tabby.jpg" class="d-block w-100 img-fluid" alt="Tabby">
                        </div>
                        <div class="carousel-item">
                            <img src="img/beagle.jpg" class="d-block w-100 img-fluid" alt="Beagle">
                        </div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample"
                        data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Previous</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#carouselExample"
                        data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Next</span>
                    </button>
                </div>

            </div>
        </div>
        <div class="row mb-4 justify-content-center">
            <div class="col-6">
                <h2 class="text-center mb-3">Bird Carousel</h2>
                <div id="carouselExampleIndicators" class="carousel slide">
                    <div class="carousel-indicators">
                        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0"
                            class="active" aria-current="true" aria-label="Slide 1"></button>
                        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"
                            aria-label="Slide 2"></button>
                        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"
                            aria-label="Slide 3"></button>
                    </div>
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="img/cockatiel.jpg" class="d-block w-100 img-fluid" alt="Cockatiel">
                        </div>
                        <div class="carousel-item">
                            <img src="img/lovebird.jpg" class="d-block w-100 img-fluid" alt="Lovebird">
                        </div>
                        <div class="carousel-item">
                            <img src="img/beagle.jpg" class="d-block w-100 img-fluid" alt="Beagle">
                        </div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators"
                        data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Previous</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators"
                        data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Next</span>
                    </button>
                </div>
            </div>
            <div class="col-6">
                <h2 class="text-center mb-3">Cat Carousel</h2>
                <div id="carouselExampleCaptions" class="carousel slide">
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
    <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="1" aria-label="Slide 2"></button>
    <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="2" aria-label="Slide 3"></button>
  </div>
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="img/orange.jpg" class="d-block w-100 img-fluid" alt="Orange">
      <div class="carousel-caption d-none d-md-block">
        <h5>Orange Cat</h5>
        <p>A beautiful orange tabby cat.</p>
      </div>
    </div>
    <div class="carousel-item">
      <img src="img/siamese.jpg" class="d-block w-100 img-fluid" alt="Siamese">
      <div class="carousel-caption d-none d-md-block">
        <h5>Siamese Cat</h5>
        <p>Some representative placeholder content for the second slide.</p>
      </div>
    </div>
    <div class="carousel-item">
      <img src="img/tabby.jpg" class="d-block w-100 img-fluid" alt="Tabby">
      <div class="carousel-caption d-none d-md-block">
        <h5>Tabby Cat</h5>
        <p>Playful tabby kitten.</p>
      </div>
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>
            </div>
        </div>
        <div class="row my-5 mb-4 justify-content-center">
            <div class="col-5 ">
                <h2>Small Dog Carousel</h2>
                <div id="carouselExampleFade" class="carousel slide carousel-fade">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="img/golden.jpg" class="d-block w-100 img-fluid" alt="Golden">
    </div>
    <div class="carousel-item">
      <img src="img/beagle.jpg" class="d-block w-100 img-fluid" alt="Beagle">
    </div>
   
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleFade" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleFade" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
